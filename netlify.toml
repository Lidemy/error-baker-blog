[build]
  publish = "_site"
  # Allows overriding metadata.json via env var
  command = "[ \"$METADATA_JSON\" ] && echo $METADATA_JSON > _data/metadata.json; npm run build"
  functions = "functions/"
  environment = { NODE_VERSION = "24", ELEVENTY_ENV = "production" }

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

# The home page and archive used to be paginated at /articles/<page>/ and
# /archive/<page>/. Keep those indexed URLs alive after consolidating the
# archive into a single page.
[[redirects]]
  from = "/articles/:page"
  to = "/archive/"
  status = 301
  force = true

[[redirects]]
  from = "/archive/:page"
  to = "/archive/"
  status = 301
  force = true

# Serve the localized 404 for any unmatched path under a language prefix
# (e.g. /ja/posts/bad-slug/ → /ja/404.html). `force` defaults to false, so
# real pages win and only genuinely-missing paths get the localized 404.
# The zh-TW root /404.html covers no-prefix and /posts/* paths.
[[redirects]]
  from = "/:lang/*"
  to = "/:lang/404.html"
  status = 404

[[headers]]
  for = "*.avif"
    [headers.values]
      Content-Type = "image/avif"
      Content-Disposition = "inline"
