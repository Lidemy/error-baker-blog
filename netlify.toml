[build]
  publish = "_site"
  # Allows overriding metadata.json via env var
  command = "[ \"$METADATA_JSON\" ] && echo $METADATA_JSON > _data/metadata.json; npm run build"
  functions = "functions/"
  environment = { NODE_VERSION = "24", ELEVENTY_ENV = "production" }

[[plugins]]
  package = "@netlify/plugin-functions-install-core"

# The home page and archive used to be paginated at /articles/<page>/ and
# /archive/<page>/. Keep those indexed URLs alive after consolidating the
# archive into a single page.
[[redirects]]
  from = "/articles/:page"
  to = "/archive/"
  status = 301
  force = true

[[redirects]]
  from = "/archive/:page"
  to = "/archive/"
  status = 301
  force = true

# Existing localized files shadow these fallbacks. A missing locale-prefixed
# URL receives the matching translated document while preserving HTTP 404.
[[redirects]]
  from = "/en/*"
  to = "/en/404.html"
  status = 404

[[redirects]]
  from = "/ja/*"
  to = "/ja/404.html"
  status = 404

[[redirects]]
  from = "/zh-CN/*"
  to = "/zh-CN/404.html"
  status = 404

[[headers]]
  for = "*.avif"
    [headers.values]
      Content-Type = "image/avif"
      Content-Disposition = "inline"
